<div class="not-prose my-[3em]{{ if last }} !mb-0{{ /if }}">
    <div class="overflow-hidden rounded-[3px] bg-dark-shade aspect-video">
        {{ if video }}
            <video
                class="w-full h-full object-cover"
                autoplay
                muted
                loop
                playsinline
                controls
                {{ if video_image }}poster="{{ glide:video_image width='1280' height='720' }}"{{ /if }}
            >
                <source src="{{ video:url ?? video }}" type="video/mp4">
            </video>
        {{ elseif youtube_link }}
            <iframe
                class="w-full h-full object-cover"
                src="https://www.youtube.com/embed/{{ youtube_link }}?autoplay=1&mute=1&loop=1&playlist={{ youtube_link }}"
                title="{{ title ?? 'Video' }}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
                frameborder="0"
            ></iframe>
        {{ /if }}
    </div>
    {{ if title }}
        <p class="mt-400 font-heading font-bold text-lg md:text-xl">{{ title }}</p>
    {{ /if }}
</div>
