              display: 'Har du været udtaget til regional talenttræning?'
              width: 50
              validate:
                - required
          -
            handle: national_talent
            field:
              type: text
              display: 'Har du været udtaget til national talenttræning?'
              width: 50
              validate:
                - required
          -
            handle: handball_training
            field:
              type: text
              display: 'Hvor mange gange om ugen træner du håndbold?'
              width: 50
              validate:
                - required
          -
            handle: strength_training
            field:
              type: text
              display: 'Hvor mange gange om ugen styrketræner du?'
              width: 50
              validate:
                - required
