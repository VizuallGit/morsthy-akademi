tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              type: text
              display: 'Dit navn'
              width: 50
              validate:
                - required
          -
            handle: birthdate
            field:
              type: text
              display: Fødselsdato
              placeholder: 'DD-MM-ÅÅÅÅ'
              width: 50
              validate:
                - required
          -
            handle: email
            field:
              type: text
              input_type: email
              display: E-mailadresse
              width: 50
              validate:
                - required
                - email
          -
            handle: phone
            field:
              type: text
              input_type: tel
              display: Telefonnummer
              width: 50
              validate:
                - required
          -
            handle: hometown
            field:
              type: text
              display: Hjemby
              width: 50
              validate:
                - required
          -
            handle: admission_year
            field:
              type: text
              display: 'Ønsket optagelsesår'
              width: 50
              validate:
                - required
          -
            handle: previous_clubs
            field:
              type: text
              display: 'Tidligere klubber'
              width: 50
              validate:
                - required
          -
            handle: current_club
            field:
              type: text
              display: 'Din nuværende klub/efterskole'
              width: 50
              validate:
                - required
          -
            handle: housing
            field:
              type: select
              display: 'Ønsker du at bo på akademiet eller derhjemme?'
              placeholder: '--'
              width: 50
              options:
                -
                  key: akademiet
