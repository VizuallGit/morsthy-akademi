tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              placeholder: 'Indtast dit navn'
              type: text
              display: Navn
          -
            handle: email
            field:
              input_type: email
              placeholder: 'Indtast din email'
              type: text
              display: E-mail
              width: 50
              validate:
                - required
          -
            handle: phone
            field:
              input_type: tel
              placeholder: 'Indtast dit telefonnummer'
              type: text
              display: 'Telefon nr'
              width: 50
