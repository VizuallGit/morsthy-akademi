title: Samarbejdspartner
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: hidden
              required: false
          -
            handle: name
            field:
              type: text
              display: Name
              validate:
                - required
          -
            handle: logo
            field:
              container: assets
              folder: samarbejdspartner
              restrict: true
              max_files: 1
              type: assets
              display: Logo
          -
            handle: link
            field:
              input_type: url
              prepend: 'https://'
              type: text
              display: Link
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
