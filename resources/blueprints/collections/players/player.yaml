title: Player
tabs:
  main:
    display: Main
    sections:
      -
        display: 'Spiller info'
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Name
          -
            handle: position
            field:
              dictionary:
                type: file
                filename: positions.json
              max_items: 1
              type: dictionary
              display: Position
          -
            handle: profile_images
            field:
              container: assets
              folder: spillere
              dynamic: slug
              type: assets
              display: 'Profile Images'
          -
            handle: number
            field:
              input_type: number
              type: text
              display: Number
              width: 25
          -
            handle: birthday
            field:
              input_type: date
              type: text
              display: Birthday
              width: 25
          -
            handle: height
            field:
              input_type: number
              type: text
              display: Height
              width: 25
          -
            handle: weight
            field:
              input_type: number
              type: text
              display: Weight
              width: 25
          -
            handle: player_sponsor
            field:
              collections:
                - sponsor
              type: entries
              display: 'Player sponsor'
  seo:
    display: Seo
    sections:
      -
        fields:
          - import: meta
            prefix: meta_
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: squad_type
            field:
              type: terms
              taxonomies:
                - squad_type
              display: 'Squad type'
              mode: select
              validate:
                - required
