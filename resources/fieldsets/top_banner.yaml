title: 'Top banner'
fields:
  -
    handle: text
    field:
      buttons:
        - h1
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - anchor
        - 'Large text'
        - Title
      toolbar_mode: floating
      container: assets
      remove_empty_nodes: trim
      type: bard
      display: Text
  -
    handle: links
    field: links.links
  -
    handle: image
    field:
      container: assets
      max_files: 1
      type: assets
      display: Image
