title: 'Media textbox'
fields:
  -
    handle: text
    field:
      buttons:
        - h2
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - quote
        - anchor
        - horizontalrule
        - 'Large text'
        - Title
      toolbar_mode: floating
      container: assets
      remove_empty_nodes: false
      type: bard
      display: Text
  -
    handle: links
    field: links.links
  -
    handle: media
    field:
      container: assets
      max_files: 1
      type: assets
      display: Media
  -
    handle: show_settings
    field:
      type: revealer
      display: 'Show settings'
  -
    handle: settings
    field:
      type: group
      display: Settings
      if:
        show_settings: 'equals true'
      fields:
        -
          handle: color
          field: common_fields.color
          config:
            width: 33
        -
          handle: flip_content
          field:
            type: toggle
            display: 'Flip content'
            width: 33
        -
          handle: image_to_edge
          field:
            type: toggle
            display: 'Image to edge'
            width: 33
        -
          handle: spacing_type
          field:
            options:
              -
                key: inside
                value: Inside
              -
                key: outside
                value: Outside
            default: outside
            type: button_group
            display: 'Spacing type'
            width: 33
        -
          handle: pt
          field: common_fields.spacing
          config:
            display: 'Spacing top'
            width: 33
        -
          handle: pb
          field: common_fields.spacing
          config:
            display: 'Spacing bottom'
            width: 33
